services:
  gpt-image-playground:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpt-image-playground
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - gpt-image-data:/app/generated-images
      - gpt-image-config:/app/data
    restart: unless-stopped

volumes:
  gpt-image-data:
  gpt-image-config:
